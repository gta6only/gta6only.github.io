<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GTA6only</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --pink: #ff3cac; --orange: #ff8c00; --purple: #7b2ff7;
      --bg: #0d0010; --card: rgba(255,255,255,0.04); --border: rgba(255,60,172,0.25);
    }
    body { background-color: var(--bg); font-family: 'Barlow', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow-x: hidden; }
    body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 100% 55% at 50% 0%, rgba(123,47,247,0.35) 0%, transparent 65%), radial-gradient(ellipse 70% 40% at 20% 100%, rgba(255,60,172,0.2) 0%, transparent 60%), radial-gradient(ellipse 60% 40% at 80% 80%, rgba(255,140,0,0.18) 0%, transparent 60%); pointer-events: none; z-index: 0; }
    body::after { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(255,60,172,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255,60,172,0.05) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }
    .container { position: relative; z-index: 1; width: 100%; max-width: 480px; padding: 2rem 1.5rem 3rem; display: flex; flex-direction: column; align-items: center; }
    .avatar-wrap { position: relative; margin-bottom: 1.4rem; }
    .avatar-ring { width: 114px; height: 114px; border-radius: 50%; padding: 3px; background: conic-gradient(from 0deg, #ff3cac, #ff8c00, #ffcc00, #7b2ff7, #ff3cac); animation: spin 5s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .avatar-inner { width: 100%; height: 100%; border-radius: 50%; background: var(--bg); overflow: hidden; }
    .username { font-family: 'Bebas Neue', sans-serif; font-size: 2.7rem; letter-spacing: 0.06em; background: linear-gradient(90deg, #ff3cac, #ff8c00, #ffcc00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; filter: drop-shadow(0 0 18px rgba(255,60,172,0.5)); margin-bottom: 0.3rem; }
    .bio { font-size: 0.9rem; color: rgba(255,255,255,0.5); text-align: center; line-height: 1.5; max-width: 320px; margin-bottom: 2rem; }
    .bio strong { background: linear-gradient(90deg, #ff3cac, #ff8c00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .divider { width: 100%; height: 1px; background: linear-gradient(90deg, transparent, #ff3cac, #ff8c00, transparent); margin-bottom: 2rem; opacity: 0.5; }
    .links { width: 100%; display: flex; flex-direction: column; gap: 0.9rem; }
    .link-btn { display: flex; align-items: center; gap: 1rem; padding: 1rem 1.3rem; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 14px; text-decoration: none; color: #fff; font-weight: 600; font-size: 0.95rem; transition: all 0.22s ease; backdrop-filter: blur(10px); position: relative; overflow: hidden; }
    .link-btn::before { content: ''; position: absolute; inset: 0; background: linear-gradient(120deg, rgba(255,60,172,0.08), rgba(255,140,0,0.06)); opacity: 0; transition: opacity 0.22s; }
    .link-btn::after { content: ''; position: absolute; left: 0; top: 15%; bottom: 15%; width: 3px; border-radius: 2px; background: linear-gradient(180deg, #ff3cac, #ff8c00); opacity: 0; transition: opacity 0.22s; }
    .link-btn:hover { border-color: rgba(255,60,172,0.6); transform: translateY(-2px) scale(1.01); box-shadow: 0 8px 32px rgba(255,60,172,0.2); }
    .link-btn:hover::before, .link-btn:hover::after { opacity: 1; }
    .link-btn:active { transform: translateY(0) scale(0.99); }
    .link-icon { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .link-text { flex: 1; }
    .link-title { display: block; font-size: 1rem; font-weight: 700; }
    .link-sub { display: block; font-size: 0.78rem; color: rgba(255,255,255,0.38); margin-top: 1px; }
    .link-arrow { color: rgba(255,255,255,0.18); font-size: 1.1rem; transition: color 0.2s, transform 0.2s; }
    .link-btn:hover .link-arrow { color: #ff3cac; transform: translateX(3px); }
    .icon-discord { background: rgba(88,101,242,0.18); color: #7289da; }
    .icon-tiktok { background: rgba(255,0,80,0.15); color: #ff2d55; }
    .icon-youtube { background: rgba(255,0,0,0.15); color: #ff4444; }
    .icon-instagram { background: rgba(255,60,172,0.15); color: #ff3cac; }
    .icon-facebook { background: rgba(24,119,242,0.15); color: #4a9eff; }
    .icon-email { background: rgba(234,67,53,0.15); color: #ea4335; }
    .footer { margin-top: 2.5rem; font-size: 0.7rem; color: rgba(255,255,255,0.15); letter-spacing: 0.05em; text-align: center; }
    .footer span { background: linear-gradient(90deg, #ff3cac, #ff8c00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; opacity: 0.7; }
    .avatar-wrap { animation: fadeUp 0.5s 0.05s ease both; }
    .username { animation: fadeUp 0.5s 0.12s ease both; }
    .bio { animation: fadeUp 0.5s 0.18s ease both; }
    .divider { animation: fadeUp 0.5s 0.22s ease both; }
    .links .link-btn:nth-child(1) { animation: fadeUp 0.5s 0.30s ease both; }
    .links .link-btn:nth-child(2) { animation: fadeUp 0.5s 0.38s ease both; }
    .links .link-btn:nth-child(3) { animation: fadeUp 0.5s 0.46s ease both; }
    .links .link-btn:nth-child(4) { animation: fadeUp 0.5s 0.54s ease both; }
    .links .link-btn:nth-child(5) { animation: fadeUp 0.5s 0.62s ease both; }
    .links .link-btn:nth-child(6) { animation: fadeUp 0.5s 0.70s ease both; }
    .footer { animation: fadeUp 0.5s 0.78s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
